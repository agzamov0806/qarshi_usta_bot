# PostgreSQL — lokal va dev uchun. Ishga tushirish: docker compose up -d
services:
  postgres:
    image: postgres:16-alpine
    container_name: usta_postgres
    environment:
      POSTGRES_USER: usta
      POSTGRES_PASSWORD: usta_dev_change
      POSTGRES_DB: usta_bot
    ports:
      - "5432:5432"
    volumes:
      - usta_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U usta -d usta_bot"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  usta_pgdata:
