# https://docs.railway.com/deploy/config-as-code
# Loyihada faqat bot servisi: Postgres plugin qo'shing, Variables da BOT_TOKEN, ADMIN_CHAT_ID.
# Replicas = 1 (bir xil token bilan ikkita jarayon ishlamasin).

[build]
builder = "NIXPACKS"

[deploy]
startCommand = "python main.py"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
